<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice_Task_2 Sabhyata_Verma</title>

    <style>
        body {
            background-color: #f2f2f2;
            font-family: Georgia, serif;
        }
        
        .container {
            width: 400px;
            margin: 20px auto;
            background: #e9e9e9;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
        
        fieldset {
            border: 1px solid black;
            padding: 10px;
        }
        
        legend {
            font-size: 18px;
            font-weight: bold;
        }
        
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        textarea {
            width: 95%;
            padding: 10px;
            border: 1px solid #bdbdbd;
            border-radius: 4px;
            font-size: 16px;
        }
        
        textarea {
            height: 45px;
            resize: none;
        }
        
        .gender-group {
            margin-top: 5px;
            margin-bottom: 10px;
        }
        
        .gender-group input {
            margin-left: 15px;
        }
        
        .gender-group input:first-child {
            margin-left: 0;
        }
        
        button {
            margin-top: 15px;
            padding: 10px 22px;
            font-size: 18px;
            border: 2px solid #444;
            border-radius: 5px;
            background: white;
            cursor: pointer;
        }
        
        button:hover {
            background: #f0f0f0;
        }
    </style>
</head>

<body>

    <div class="container">

        <form action="" method="get">

            <fieldset>
                <legend>User personal information</legend>

                <label for="fname">Enter your full name</label>
                <input type="text" id="fname" value="Rahul Kumar">

                <label for="email">Enter your email</label>
                <input type="email" id="email" value="geeks@12345gmail.com">

                <label for="password">Enter your password</label>
                <input type="password" id="password">

                <label for="confirm_password">Confirm your password</label>
                <input type="password" id="confirm_password">

                <label>Enter your gender</label>
                <div class="gender-group">
                    <input type="radio" id="male" name="gender" checked>
                    <label for="male" style="display:inline;">Male</label>

                    <input type="radio" id="female" name="gender">
                    <label for="female" style="display:inline;">Female</label>

                    <input type="radio" id="others" name="gender">
                    <label for="others" style="display:inline;">Others</label>
                </div>

                <label for="dob">Enter your Date of Birth</label>
                <input type="date" id="dob" value="2009-10-06">

                <label for="address">Enter your Address:</label>
                <textarea id="address">Noida Sector 137</textarea>

                <button type="submit">submit</button>

            </fieldset>

        </form>

    </div>

</body>

</html>
